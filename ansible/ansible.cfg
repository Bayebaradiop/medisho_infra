[defaults]
inventory = inventory.ini
host_key_checking = False
interpreter_python = /usr/bin/python3
stdout_callback = yaml
# Affiche le detail des taches changees
display_skipped_hosts = False
retry_files_enabled = False

[ssh_connection]
# Rejoue la config SSH generee depuis Terraform : c'est elle qui porte le
# ProxyJump vers le Front pour atteindre les machines privees.
ssh_args = -F ssh.cfg -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
